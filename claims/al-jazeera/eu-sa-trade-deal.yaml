summary: "The long-awaited trade agreement between the European Union and the Mercosur bloc has finally taken provisional effect as of May 1. The deal is expected to reshape global commodity markets, though it faces intense scrutiny from environmental groups concerned about South American deforestation."
title: "EU trade deal with South America's Mercosur bloc takes provisional effect"
