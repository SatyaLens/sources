summary: "U.S. President Donald Trump has officially announced a new 25% tariff on all cars and trucks imported from the European Union, effective next week. The administration claims the EU is 'not complying' with previous trade agreements, specifically citing imbalances in agricultural trade and digital services taxes. This move comes as the EU begins provisional application of its own massive trade deal with the Mercosur bloc, further straining transatlantic economic relations."
title: "Trump announces 25 percent tariffs on European Union cars, trucks"
