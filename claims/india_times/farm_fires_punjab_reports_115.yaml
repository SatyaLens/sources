"summary": "Punjab reported 115 new farm fire cases on Monday, bringing its seasonal total to 9,452, with Ferozepur being the worst-affected district. Nationally, 65,634 cases were reported, with Madhya Pradesh accounting for over 50% (37,432). In Punjab, authorities have filed 731 FIRs, made 784 red entries in land records, and imposed ₹93.79 lakh in environmental compensation to curb crop residue burning."
"title": "Farm fires: Punjab reports 115 new cases"
