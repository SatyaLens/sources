summary: "Google has entered into a significant agreement with the U.S. Department of Defense (recently renamed the Department of War) to provide its advanced artificial intelligence models for use on classified networks. The contract allows for 'any lawful government purpose,' mirroring recent deals signed by OpenAI and xAI. While the agreement includes clauses stating the technology is not intended for autonomous weaponry or mass surveillance without human oversight, it has sparked significant internal backlash, with over 600 employees signing a letter of protest citing ethical concerns."
title: "Google Signs AI Deal With Pentagon for Classified Work as Employees Object"
