summary: "Beijing has announced a significant expansion of its trade policy, granting zero-tariff treatment to all African nations with which it maintains diplomatic ties, effective May 1, 2026. The move aims to strengthen the China-Africa Economic Partnership and secure green energy and agricultural supply chains."
title: "China to grant zero-tariff treatment to all African countries from May 1"
