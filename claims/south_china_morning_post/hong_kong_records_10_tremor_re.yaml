"summary": "The Hong Kong Observatory received more than 10 reports of a locally felt tremor from a magnitude 5.2 earthquake that struck Guangxi early on Monday. According to the forecaster, the epicentre was located about 550km (342 miles) west-northwest of Hong Kong, with a focal depth of about 10km. “The Observatory received more than 10 locally felt reports of the tremor, which lasted a few seconds,” it said on Monday. “Initial estimates put the local intensity at II (two) on the Modified Mercalli..."
"title": "Hong Kong records 10 tremor reports after magnitude 5.2 quake hits Guangxi"
