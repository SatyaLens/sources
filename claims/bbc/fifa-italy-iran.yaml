summary: "FIFA has officially dismissed rumors and legal petitions suggesting that Italy could replace Iran in the upcoming 2026 World Cup. Despite Iran missing the FIFA congress and ongoing geopolitical tensions in the Gulf, football's governing body confirmed there is no plan to alter the tournament's lineup."
title: "No FIFA plan for Italy to replace Iran at World Cup"
