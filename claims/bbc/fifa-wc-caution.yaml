summary: "A coalition of US-based civil rights organizations has issued a travel advisory for international visitors attending the 2026 World Cup. The groups cite concerns over surveillance and shifting local legislation in host cities, urging fans to remain vigilant regarding data privacy and civil liberties."
title: "US rights groups urge caution for World Cup visitors"
