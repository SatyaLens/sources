summary: "Beijing has lifted diplomatic sanctions against a Dutch official as China prepares to welcome the Dutch trade minister for high-level talks. The diplomatic thaw aims to address and resolve ongoing disputes surrounding export controls and the operations of semiconductor firms Nexperia and ASML."
title: "Un-sanctioned: China to welcome Dutch trade minister amid Nexperia, ASML discord"
