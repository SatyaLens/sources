summary: "Chinese GPU manufacturer Moore Threads reported a profit of US$4.3 million, marking a significant financial milestone. The company, seen as a domestic rival to Nvidia, is experiencing a surge in demand driven by Beijing's aggressive push for semiconductor self-reliance amid tightening US export restrictions."
title: "Moore Threads posts US$4.3m profit as Nvidia rival surges amid Beijing chip push"
