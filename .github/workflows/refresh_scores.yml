name: Verify Claims and Source Scores

on:
  workflow_run:
    workflows: ["POST New Documents on Merge"]
    types:
      - completed

jobs:
  verify-and-score:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - name: Verify claims
      run: |
        curl -f -X 'POST' \
          '${{ vars.API_BASE_URL }}/api/v1/claims/verify' \
          -H 'accept: */*' \
          -H "X-API-Key: ${{ secrets.API_KEY }}" \
          -d ''

    - name: Refresh source scores
      run: |
        curl -f -X 'POST' \
          '${{ vars.API_BASE_URL }}/api/v1/sources/scores' \
          -H 'accept: */*' \
          -H "X-API-Key: ${{ secrets.API_KEY }}" \
          -d ''